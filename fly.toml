# NOVA AI — Fly.io Configuration
# Deploy: fly launch && fly secrets set DATABASE_URL="..." JWT_SECRET="..." OPENAI_API_KEY="..."
# Docs: https://fly.io/docs/

app = "sentinel-ai"
primary_region = "iad"  # Washington DC (change to your preferred region)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"  # Keep running for persistent AI assistant
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  path = "/"
  timeout = "5s"

[deploy]
  strategy = "rolling"
  max_unavailable = 1

# Persistent volume for SQLite (if you switch from MySQL)
# [mounts]
#   source = "sentinel_data"
#   destination = "/data"
